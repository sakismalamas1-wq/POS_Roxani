<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <title>ADMIN ΡΩΞΑΝΗ - ΤΕΛΙΚΟ</title>
    <style>
        body { background: #000; color: #fff; font-family: Arial, sans-serif; padding: 10px; margin: 0; }
        .container { display: flex; height: 100vh; gap: 15px; }
        .sidebar { width: 350px; background: #1a1a1a; padding: 15px; border-right: 2px solid #00FF00; overflow-y: auto; }
        .main-content { flex-grow: 1; background: #111; padding: 15px; overflow-y: scroll; border: 1px solid #333; }
        h2 { color: #00FF00; font-size: 22px; text-align: center; border-bottom: 2px solid #00FF00; padding-bottom: 5px; text-transform: uppercase; }
        label { display: block; margin-top: 10px; color: #ffc107; font-weight: bold; }
        input, select { width: 100%; padding: 12px; margin-top: 5px; background: #333; color: #fff; border: 1px solid #666; border-radius: 5px; box-sizing: border-box; font-size: 16px; }
        .btn { width: 100%; padding: 15px; margin-top: 10px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; font-size: 18px; text-transform: uppercase; }
        .btn-add { background: #28a745; color: white; }
        .btn-settings { background: #007bff; color: white; }
        .btn-back { background: #555; color: white; margin-top: 20px; }
        .btn-del { background: #ff4444; color: white; border: none; padding: 8px 15px; border-radius: 4px; cursor: pointer; font-weight: bold; }
        .item-card { display: flex; justify-content: space-between; align-items: center; background: #222; padding: 12px; margin-bottom: 8px; border-radius: 5px; border-left: 6px solid #00FF00; }
        .cat-title { background: #00FF00; color: #000; padding: 10px; margin-top: 20px; font-weight: bold; font-size: 18px; position: sticky; top: 0; }
    </style>
</head>
<body>

<div class="container">
    <div class="sidebar">
        <h2>ΠΡΟΣΘΗΚΗ</h2>
        <input type="text" id="name" placeholder="Όνομα Προϊόντος">
        <input type="text" id="price" placeholder="Τιμή (π.χ. 0.60)">
        
        <label>ΚΑΤΗΓΟΡΙΑ:</label>
        <select id="category">
            <option>ΨΩΜΙ ΠΙΤΑ</option><option>ΚΡΥΑ</option><option>ΖΕΣΤΑ</option><option>ΣΑΛΑΤΕΣ</option>
            <option>ΣΧΑΡΑΣ</option><option>ΤΕΜΑΧΙΑ</option><option>ΣΠΕΣΙΑΛ</option><option>ΜΑΓΕΙΡΕΥΤΑ</option>
            <option>ΘΑΛΑΣΣΙΝΑ</option><option>ΣΑΝΤΟΥΙΤΣ</option><option>ΟΥΖΑ ΤΣΙΠΟΥΡΑ</option><option>ΜΠΥΡΕΣ</option>
            <option>ΚΡΑΣΙΑ ΡΕΤΣΙΝΕΣ</option><option>ΑΝΑΨΥΚΤΙΚΑ</option><option>DELIVERY</option><option>ΔΙΑΦΟΡΑ</option>
        </select>
        
        <label>EXTRAS (με κόμμα):</label>
        <input type="text" id="extras" placeholder="π.χ. Κέτσαπ,Μουστάρδα">
        
        <button class="btn btn-add" onclick="addItem()">ΠΡΟΣΘΗΚΗ ΤΩΡΑ</button>

        <h2>ΡΥΘΜΙΣΕΙΣ</h2>
        <button class="btn btn-settings" onclick="saveSettings()">ΑΠΟΘΗΚΕΥΣΗ ΡΥΘΜΙΣΕΩΝ</button>
        
        <label class="btn btn-settings" style="text-align:center; background:#6f42c1; cursor:pointer;">
            📥 ΦΟΡΤΩΣΗ ΑΠΟ ΑΡΧΕΙΟ <input type="file" style="display:none" onchange="importFile(event)">
			<button class="btn" style="background:#dc3545; color:white;" onclick="downloadBackup()">💾 ΑΠΟΘΗΚΕΥΣΗ (BACKUP) ΣΤΟ ΣΤΙΚΑΚΙ</button>
        </label>
        
        <button class="btn btn-back" onclick="window.location.href='index.html'">🔙 ΕΠΙΣΤΡΟΦΗ</button>

</div>
    <div class="main-content">
        <h2>ΛΙΣΤΑ ΠΡΟΪΟΝΤΩΝ (SCROLL)</h2>
        <div id="product_list"></div>
    </div>
        </div>
    <div style="margin-top: 30px; padding: 15px; background: #222; border: 1px solid #444; border-radius: 10px; color: white;">
    <h3 style="margin-top:0; color: #ffc107; text-align: center;">Διαχείριση Βάσης Προϊόντων</h3>
    <p style="font-size: 14px; color: #ccc; margin-bottom: 15px; text-align: center;">Χρησιμοποιήστε τα παρακάτω για να μεταφέρετε τα προϊόντα σας.</p>
    
    <div style="display: flex; flex-direction: column; align-items: center; gap: 10px;">
        <button onclick="exportProducts()" style="width: 180px; padding: 10px; background: #007bff; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; font-size: 14px;">
            💾 ΕΞΑΓΩΓΗ (Backup)
        </button>
        <button onclick="importProducts()" style="width: 180px; padding: 10px; background: #28a745; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; font-size: 14px;">
            📂 ΕΙΣΑΓΩΓΗ (Restore)
        </button>
    </div>
</div>

<script>
    let products = JSON.parse(localStorage.getItem('roxani_products')) || [];

    function addItem() {
        const n = document.getElementById('name').value;
        let p = document.getElementById('price').value.replace(',', '.');
        p = parseFloat(p);
        const cat = document.getElementById('category').value;
        const exStr = document.getElementById('extras').value;
        const ex = exStr ? exStr.split(',').map(x => x.trim()) : [];

        if(!n || isNaN(p)) { alert("Βάλε όνομα και τιμή (π.χ. 0.60)!"); return; }

        products.push({ name: n, price: p, category: cat, extras: ex });
        saveData();
        
        document.getElementById('name').value = "";
        document.getElementById('price').value = "";
        document.getElementById('extras').value = "";
    }

    function deleteItem(index) {
        if(confirm("Θέλεις σίγουρα διαγραφή;")) {
            products.splice(index, 1);
            saveData();
        }
    }

    function saveData() {
        localStorage.setItem('roxani_products', JSON.stringify(products));
        renderList();
    }

    function renderList() {
        const listDiv = document.getElementById('product_list');
        listDiv.innerHTML = "";
        
        if (products.length === 0) {
            listDiv.innerHTML = "<p style='text-align:center; color:gray;'>Η λίστα είναι κενή.</p>";
            return;
        }

        const grouped = {};
        products.forEach((p, index) => {
            // ΕΔΩ ΕΙΝΑΙ Η ΔΙΟΡΘΩΣΗ: Κοιτάμε όλα τα πιθανά ονόματα για την κατηγορία
            let c = p.category || p.Κατηγορία || p.kat || "ΓΕΝΙΚΑ";
            if(!grouped[c]) grouped[c] = [];
            grouped[c].push({...p, originalIndex: index});
        });

        for(let cat in grouped) {
            const catDiv = document.createElement('div');
            catDiv.className = "cat-title";
            catDiv.innerText = cat;
            listDiv.appendChild(catDiv);

            grouped[cat].forEach(item => {
                const name = item.name || item.Όνομα || "Χωρίς όνομα";
                const price = parseFloat(item.price || item.Τιμή || 0).toFixed(2);
                const extras = item.extras ? item.extras.join(", ") : "";

                const row = document.createElement('div');
                row.className = "item-card";
                row.innerHTML = '<div><b style="font-size:18px;">' + name + '</b> (' + price + '€)<br><small style="color:#aaa;">' + extras + '</small></div>' +
                                '<button class="btn-del" onclick="deleteItem(' + item.originalIndex + ')">ΔΙΑΓΡΑΦΗ</button>';
                listDiv.appendChild(row);
            });
        }
    }

    function importFile(e) {
        const reader = new FileReader();
        reader.onload = function(ev) {
            try {
                const data = JSON.parse(ev.target.result);
                // "Καθαρίζουμε" τα δεδομένα για να παίζουν παντού
                products = data.map(item => ({
                    name: item.name || item.Όνομα || "Άγνωστο",
                    price: parseFloat(item.price || item.Τιμή || 0),
                    category: item.category || item.Κατηγορία || "ΔΙΑΦΟΡΑ",
                    extras: item.extras || []
                }));
                saveData();
                alert("Το μενού φορτώθηκε επιτυχώς!");
            } catch (err) { alert("Λάθος αρχείο!"); }
        };
        reader.readAsText(e.target.files[0]);
    }

    function saveSettings() { alert("Οι ρυθμίσεις αποθηκεύτηκαν!"); }
	
	function downloadBackup() {
    if(products.length === 0) return alert("Δεν υπάρχουν προϊόντα για αποθήκευση!");
    
    // Μετατροπή των προϊόντων σε κείμενο JSON
    const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(products));
    const downloadAnchorNode = document.createElement('a');
    
    // Όνομα αρχείου με τη σημερινή ημερομηνία
    const date = new Date().toLocaleDateString('el-GR').replace(/\//g, '-');
    downloadAnchorNode.setAttribute("href", dataStr);
    downloadAnchorNode.setAttribute("download", "backup_roxani_" + date + ".json");
    
    document.body.appendChild(downloadAnchorNode);
    downloadAnchorNode.click();
    downloadAnchorNode.remove();
    
    alert("Το αρχείο αποθηκεύτηκε! Βάλτο στο στικάκι σου.");
}

    window.onload = renderList;
</script>
</body>
</html>
