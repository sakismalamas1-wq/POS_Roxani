<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - ΡΩΞΑΝΗ</title>
    <style>
        body { background: #121212; color: white; font-family: sans-serif; padding: 10px; margin: 0; }
        .admin-box { background: #1e1e1e; padding: 15px; border-radius: 10px; border: 1px solid #333; max-width: 600px; margin: auto; }
        h2 { color: #00FF00; text-align: center; }
        
        .input-group { margin-bottom: 15px; display: flex; flex-direction: column; }
        label { margin-bottom: 5px; color: #aaa; font-size: 14px; }
        input, select { padding: 12px; border-radius: 5px; border: 1px solid #444; background: #2a2a2a; color: white; font-size: 16px; }
        
        .btn { padding: 15px; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; width: 100%; margin-top: 10px; font-size: 16px; }
        .btn-add { background: #28a745; color: white; }
        .btn-back { background: #444; color: white; margin-top: 20px; }
        
        /* BACKUP SECTION */
        .backup-section { margin-top: 30px; padding: 15px; background: #252525; border: 1px dashed #555; border-radius: 8px; text-align: center; }
        .btn-export { background: #007bff; color: white; margin-bottom: 15px; }
        .import-label { display: block; background: #6c757d; color: white; padding: 10px; border-radius: 5px; cursor: pointer; margin-top: 10px; }
        
        .product-item { background: #2a2a2a; padding: 10px; margin-top: 10px; border-radius: 5px; display: flex; justify-content: space-between; align-items: center; border-left: 4px solid #00FF00; }
        .btn-del { background: #dc3545; color: white; padding: 5px 10px; border-radius: 4px; border: none; }
    </style>
</head>
<body>

<div class="admin-box">
    <h2>⚙ ΔΙΑΧΕΙΡΙΣΗ ΜΕΝΟΥ</h2>
    
    <div class="input-group">
        <label>Όνομα Φαγητού / Ποτού:</label>
        <input type="text" id="p_name" placeholder="π.χ. Σνίτσελ Χοιρινό">
    </div>
    
    <div class="input-group">
        <label>Κατηγορία:</label>
        <select id="p_cat">
            <option value="ΨΩΜΙ ΠΙΤΑ">ΚΡΥΑ</option>
            <option value="ΚΡΥΑ">ΚΡΥΑ</option>
            <option value="ΖΕΣΤΑ">ΖΕΣΤΑ</option>
            <option value="ΣΑΛΑΤΕΣ">ΣΑΛΑΤΕΣ</option>
            <option value="ΣΧΑΡΑΣ">ΣΧΑΡΑΣ</option>
            <option value="ΤΕΜΑΧΙΑ">ΤΕΜΑΧΙΑ</option>
            <option value="ΣΠΕΣΙΑΛ">ΖΕΣΤΑ</option>
            <option value="ΜΑΓΕΙΡΕΥΤΑ">ΜΑΓΕΙΡΕΥΤΑ</option>
            <option value="ΘΑΛΑΣΣΙΝΑ">ΘΑΛΑΣΣΙΝΑ</option>
            <option value="ΣΑΝΤΟΥΙΤΣ">ΣΑΝΤΟΥΙΤΣ</option>
            <option value="ΟΥΖΑ ΤΣΙΠΟΥΡΑ">ΟΥΖΑ ΤΣΙΠΟΥΡΑ</option>
            <option value="ΜΠΥΡΕΣ">ΜΠΥΡΕΣ</option>
            <option value="ΚΡΑΣΙΑ ΡΕΤΣΙΝΕΣ">ΚΡΑΣΙΑ ΡΕΤΣΙΝΕΣ</option>
            <option value="ΑΝΑΨΥΚΤΙΚΑ">ΑΝΑΨΥΚΤΙΚΑ</option>
            <option value="DEKIVERY">DELIVERY</option>
            <option value="ΔΙΑΦΟΡΑ">ΔΑΦΟΡΑ</option>
        </select>
    </div>

    <div class="input-group">
        <label>Τιμή (€):</label>
        <input type="number" id="p_price" step="0.10" placeholder="0.00">
    </div>

    <div class="input-group">
        <label>Extras (π.χ. Πατάτες|0.60, Ψωμί|0.50):</label>
        <input type="text" id="p_extras" placeholder="Όνομα|Τιμή χωρισμένα με κόμμα">
    </div>

    <button class="btn btn-add" onclick="addProduct()">ΠΡΟΣΘΗΚΗ ΣΤΟ ΜΕΝΟΥ</button>

    <hr style="margin: 25px 0; border: 0; border-top: 1px solid #444;">

    <div class="backup-section">
        <h3>💾 ΜΕΤΑΦΟΡΑ ΜΕΝΟΥ</h3>
        <p style="font-size: 12px; color: #888;">Χρησιμοποίησε αυτά για να στείλεις το μενού στο κινητό ή σε άλλο PC μέσω USB.</p>
        
        <button class="btn btn-export" onclick="exportMenu()">ΑΠΟΘΗΚΕΥΣΗ ΣΕ ΑΡΧΕΙΟ (.json)</button>
        
        <label class="import-label">
            📂 ΦΟΡΤΩΣΗ ΑΠΟ ΑΡΧΕΙΟ
            <input type="file" id="importFile" style="display: none;" onchange="importMenu(event)">
        </label>
    </div>

    <button class="btn btn-back" onclick="window.location.href='index.html'">⬅ ΕΠΙΣΤΡΟΦΗ ΣΤΟ POS</button>

    <div id="productList" style="margin-top: 20px;">
        </div>
</div>

<script>
    let products = JSON.parse(localStorage.getItem('roxani_products')) || [];

    function addProduct() {
        const name = document.getElementById('p_name').value;
        const cat = document.getElementById('p_cat').value;
        const price = parseFloat(document.getElementById('p_price').value);
        const extrasRaw = document.getElementById('p_extras').value;

        if(!name || isNaN(price)) return alert("Βάλε όνομα και τιμή!");

        // Μετατροπή των extras σε λίστα
        const extras = extrasRaw ? extrasRaw.split(',').map(s => s.trim()) : [];

        products.push({ name, category: cat, price, extras });
        saveAndRender();
        
        // Καθαρισμός φορμας
        document.getElementById('p_name').value = "";
        document.getElementById('p_price').value = "";
        document.getElementById('p_extras').value = "";
    }

    function saveAndRender() {
        localStorage.setItem('roxani_products', JSON.stringify(products));
        renderProducts();
    }

    function renderProducts() {
        const list = document.getElementById('productList');
        list.innerHTML = "<h3>ΛΙΣΤΑ ΠΡΟΪΟΝΤΩΝ:</h3>";
        products.forEach((p, index) => {
            list.innerHTML += `
                <div class="product-item">
                    <span><strong>${p.name}</strong> - ${p.price.toFixed(2)}€ (${p.category})</span>
                    <button class="btn-del" onclick="deleteProduct(${index})">ΔΙΑΓΡΑΦΗ</button>
                </div>
            `;
        });
    }

    function deleteProduct(index) {
        if(confirm("Διαγραφή;")) {
            products.splice(index, 1);
            saveAndRender();
        }
    }

    // --- ΛΕΙΤΟΥΡΓΙΕΣ BACKUP ---

    function exportMenu() {
        if (products.length === 0) return alert("Το μενού είναι άδειο!");
        const dataStr = JSON.stringify(products);
        const blob = new Blob([dataStr], { type: "application/json" });
        const url = URL.createObjectURL(blob);
        const link = document.createElement("a");
        link.href = url;
        link.download = "menu_roxani.json";
        link.click();
    }

    function importMenu(event) {
        const file = event.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = function(e) {
            try {
                const importedData = JSON.parse(e.target.result);
                if (Array.isArray(importedData)) {
                    products = importedData;
                    saveAndRender();
                    alert("Το μενού φορτώθηκε επιτυχώς!");
                }
            } catch (err) {
                alert("Λάθος αρχείο!");
            }
        };
        reader.readAsText(file);
    }

    renderProducts();
</script>

</body>
</html>
