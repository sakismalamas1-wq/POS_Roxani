<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <title>POS ΡΩΞΑΝΗ PRO</title>
    <style>
        body { background: #000; color: white; font-family: sans-serif; margin: 0; padding: 10px; overflow: hidden; }
        .container { display: grid; grid-template-columns: 380px 1fr 1fr; gap: 15px; height: 95vh; }
        .box { background: #1a1a1a; padding: 15px; border-radius: 8px; border: 2px solid #333; display: flex; flex-direction: column; }
        #orderList { background: white; color: black; padding: 10px; border-radius: 5px; flex-grow: 1; overflow-y: auto; }
        #totalContainer { background: #000; color: #00FF00; padding: 10px; text-align: center; font-size: 30px; border: 2px solid #00FF00; margin-top: 5px; }
        .table-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 5px; overflow-y: auto; }
        .btn-table { background: #333; color: white; height: 50px; font-weight: bold; border: 1px solid #555; cursor: pointer; }
        #categories { display: grid; grid-template-columns: repeat(3, 1fr); gap: 5px; }
        #categories button { background: #444; color: yellow; padding: 10px; border: none; cursor: pointer; font-weight: bold; }
        #products { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; margin-top: 10px; overflow-y: auto; }
        #products button { background: #0056b3; color: white; height: 60px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .btn-main { padding: 15px; margin-top: 5px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; color: white; }
    </style>
</head>
<body onload="initApp()">
    <div class="container">
        <div class="box">
            <h2 style="text-align:center; margin:0;">ΡΩΞΑΝΗ</h2>
            <div id="orderList"></div>
            <div id="totalContainer"><span id="totalAmount">0.00€</span></div>
            <button class="btn-main" style="background:#007bff;" onclick="sendToKitchen()">ΚΟΥΖΙΝΑ</button>
            <button class="btn-main" style="background:#28a745;" onclick="printFinalBill()">ΛΟΓΑΡΙΑΣΜΟΣ</button>
            <button class="btn-main" style="background:#dc3545;" onclick="clearCurrentScreen()">ΑΚΥΡΩΣΗ</button>
        </div>
        <div class="box">
            <h3>ΤΡΑΠΕΖΙΑ</h3>
            <div id="tableContainer" class="table-grid"></div>
        </div>
        <div class="box">
            <h3>ΜΕΝΟΥ</h3>
            <div id="categories"></div>
            <div id="products"></div>
        </div>
    </div>

    <div id="extrasModal" style="display:none; position:fixed; z-index:999; left:0; top:0; width:100%; height:100%; background:rgba(0,0,0,0.9);">
        <div style="background:#222; margin:5% auto; padding:20px; border:2px solid #00FF00; width:80%; border-radius:15px; text-align:center;">
            <h2 id="modalTitle" style="color:#00FF00;">EXTRAS</h2>
            <div id="extrasContainer" style="display:grid; grid-template-columns: 1fr 1fr 1fr; gap:10px; margin-bottom:20px;"></div>
            <button onclick="closeExtras()" style="background:#28a745; color:white; padding:20px; width:100%; border:none; border-radius:10px; font-weight:bold; font-size:18px;">ΤΕΛΟΣ</button>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
